<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
    </script>
    <script>
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .markdown-body pre { background: #f6f8fa; padding: 16px; border-radius: 6px; overflow-x: auto; }
        .markdown-body code { font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace; font-size: 85%; }
        .message-enter { animation: slideIn 0.3s ease-out forwards; opacity: 0; transform: translateY(10px); }
        @keyframes slideIn { to { opacity: 1; transform: translateY(0); } }
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        #chatMessages {max-width: 66vw; max-height: 86vh;}
        #userInput { min-height: 44px; outline: none; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-slate-950 h-screen flex flex-col md:flex-row overflow-hidden text-slate-800 dark:text-slate-100">

    <!-- Sidebar: Memory & Stats -->
    <aside class="w-full md:w-80 bg-white dark:bg-slate-900 border-r border-gray-200 dark:border-slate-800 flex flex-col h-1/3 md:h-full z-10 shrink-0 shadow-sm">
        <div class="p-4 border-b border-gray-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900 flex items-center justify-between">
            <h1 class="font-bold text-lg text-slate-700"><i class="fas fa-robot text-blue-500 mr-2"></i> Agent Core</h1>
            <div class="flex items-center gap-2">
                <button id="themeToggleBtn" type="button" title="Toggle dark mode" aria-label="Toggle dark mode" class="text-slate-500 dark:text-slate-300 hover:text-slate-700 dark:hover:text-slate-100 h-8 w-8 rounded-md border border-gray-200 dark:border-slate-700 flex items-center justify-center">
                    <i id="themeToggleIcon" class="fas fa-moon text-xs"></i>
                </button>
                <span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded-full font-semibold">Online</span>
            </div>
        </div>
        <div class="flex-1 overflow-y-auto p-4 space-y-4">
            <div>
                <h2 class="text-xs font-bold text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-2">Capabilities</h2>
                <div class="bg-blue-50 dark:bg-blue-950/40 text-blue-700 dark:text-blue-200 p-3 rounded-lg text-sm border border-blue-100 dark:border-blue-900">
                    <i class="fas fa-code mr-1"></i> <strong>JavaScript Execution</strong><br>
                    <span class="text-xs opacity-80">Agent can write and run JS in your browser to solve logic, math, or DOM tasks.</span>
                </div>
            </div>
            
            <div>
                <h2 class="text-xs font-bold text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-2 flex justify-between items-center">
                    Agent Memory
                    <button id="clearMemoryBtn" class="text-red-400 hover:text-red-600 cursor-pointer" title="Clear Memory">
                        <i class="fas fa-trash"></i>
                    </button>
                </h2>
                <div id="memoryList" class="space-y-2">
                    <!-- Memory items populate here -->
                    <div class="text-xs text-gray-400 dark:text-gray-500 italic text-center py-4">No memories recorded yet...</div>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Chat Area -->
    <main class="flex-1 flex flex-col h-2/3 md:h-full relative bg-white dark:bg-slate-900">
        <!-- Header -->
        <header class="h-14 border-b border-gray-200 dark:border-slate-800 flex items-center px-4 bg-white/80 dark:bg-slate-900/80 backdrop-blur-sm z-10 shadow-sm">
            <h2 class="font-semibold text-gray-700 dark:text-slate-200">Chat Session</h2>
        </header>

        <!-- Messages Container -->
        <div id="chatMessages" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-6 pb-24">
            <!-- Welcome Message -->
            <div class="flex items-start message-enter">
                <div class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center text-white shrink-0 shadow-md">
                    <i class="fas fa-robot text-sm"></i>
                </div>
                <div class="ml-3 bg-gray-100 dark:bg-slate-800 p-4 rounded-2xl rounded-tl-none text-sm text-gray-800 dark:text-slate-100 max-w-[85%] shadow-sm">
                    <p>Hello! I am ZeroClaw, an autonomous browser-based agent. How can I assist you today?</p>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="absolute bottom-0 left-0 w-full bg-white dark:bg-slate-900 border-t border-gray-200 dark:border-slate-800 p-4">
            <form id="chatForm" class="max-w-4xl mx-auto flex items-end gap-2 bg-gray-50 dark:bg-slate-800 p-2 rounded-xl border border-gray-200 dark:border-slate-700 shadow-inner">
                <textarea id="userInput" rows="1" class="flex-1 bg-transparent border-0 focus:ring-0 resize-none max-h-32 text-sm p-2 text-slate-800 dark:text-slate-100 placeholder:text-slate-400 dark:placeholder:text-slate-500" placeholder="Ask me to calculate something, check the weather, or run a script..."></textarea>
                <button type="submit" id="sendBtn" title="Send message" aria-label="Send message" class="h-11 w-11 bg-blue-600 hover:bg-blue-700 text-white rounded-lg flex items-center justify-center transition-colors shrink-0 shadow-md disabled:bg-blue-300 disabled:cursor-not-allowed">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </form>
        </div>
    </main>

    <script type="module" src="./js/aarchie.js"></script>
</body>
</html>
