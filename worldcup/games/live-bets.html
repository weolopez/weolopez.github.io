<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#060f24">
<title>Live Bets · WC2026</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #060f24; --surface: #0a1f44; --card: #0f2454; --card2: #142860;
  --gold: #BFA260; --green: #00c58e; --red: #ef4444; --orange: #f97316;
  --text: #f1f5f9; --muted: #8899bb; --border: rgba(255,255,255,0.1);
}
html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; }
body {
  background:
    radial-gradient(ellipse at 10% 0%, rgba(191,162,96,0.1) 0%, transparent 50%),
    radial-gradient(ellipse at 90% 80%, rgba(0,197,142,0.07) 0%, transparent 45%),
    var(--bg);
  padding-bottom: 60px;
}

/* TOPBAR */
#topbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px; padding: 0 16px; height: 52px;
}
.back { color: var(--muted); text-decoration: none; font-size: 0.8rem; font-weight: 600; }
.back:hover { color: var(--text); }
#topbar-title { flex: 1; font-size: 0.95rem; font-weight: 800; color: var(--gold); }
.coins-pill {
  background: rgba(191,162,96,0.15); border: 1px solid rgba(191,162,96,0.3);
  border-radius: 20px; padding: 5px 12px;
  font-size: 0.82rem; font-weight: 800; color: var(--gold);
  display: flex; align-items: center; gap: 5px;
}

/* HERO */
#hero {
  background: linear-gradient(135deg, var(--surface) 0%, var(--card) 100%);
  border-bottom: 1px solid var(--border);
  padding: 18px 20px 14px; text-align: center;
}
#hero .eyebrow { font-size: 0.62rem; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 6px; }
#hero h2 { font-size: 1.1rem; font-weight: 900; margin-bottom: 4px; }
#hero p { font-size: 0.8rem; color: var(--muted); }

/* TABS */
#tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--card); }
.tab { flex: 1; padding: 12px; text-align: center; font-size: 0.82rem; font-weight: 700; color: var(--muted); cursor: pointer; border: none; background: none; font-family: inherit; color: inherit; transition: color 0.15s; }
.tab.active { color: var(--gold); border-bottom: 2px solid var(--gold); }

/* MAIN */
main { max-width: 640px; margin: 0 auto; padding: 16px; }

/* MATCH BET CARD */
.match-bet-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; margin-bottom: 16px; overflow: hidden;
}
.match-bet-card.live-card { border-color: var(--red); box-shadow: 0 0 0 1px rgba(239,68,68,0.2); }

.mbc-header {
  padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.live-dot { display: inline-flex; align-items: center; gap: 5px; font-size: 0.7rem; font-weight: 800; color: var(--red); }
.live-dot::before { content:''; width:7px; height:7px; border-radius:50%; background:var(--red); animation: pulse 1.2s infinite; }
@keyframes pulse { 50%{ opacity: 0.4; } }
.match-time { font-size: 0.72rem; color: var(--muted); font-weight: 600; }

.mbc-teams {
  padding: 16px;
  display: flex; align-items: center; gap: 10px;
}
.mbc-team { flex: 1; text-align: center; }
.mbc-flag { font-size: 2.4rem; line-height: 1; display: block; margin-bottom: 4px; }
.mbc-name { font-size: 0.78rem; font-weight: 800; }
.mbc-score { font-size: 2rem; font-weight: 900; color: var(--gold); min-width: 60px; text-align: center; }
.mbc-vs { font-size: 1rem; color: var(--muted); min-width: 40px; text-align: center; }

/* BET MARKETS */
.markets { padding: 0 16px 16px; display: flex; flex-direction: column; gap: 10px; }
.market { background: var(--card2); border-radius: 12px; padding: 12px; }
.market-title { font-size: 0.68rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 10px; }
.bet-row { display: flex; gap: 8px; flex-wrap: wrap; }
.bet-opt {
  flex: 1; min-width: 80px; padding: 10px 8px; text-align: center;
  background: rgba(255,255,255,0.05); border: 1.5px solid var(--border);
  border-radius: 10px; cursor: pointer; transition: all 0.15s;
  font-family: inherit;
}
.bet-opt:hover { background: rgba(255,255,255,0.1); border-color: rgba(191,162,96,0.5); }
.bet-opt.selected { background: rgba(191,162,96,0.18); border-color: var(--gold); }
.bet-opt.won { background: rgba(0,197,142,0.18); border-color: var(--green); cursor: default; }
.bet-opt.lost { background: rgba(239,68,68,0.12); border-color: var(--red); opacity: 0.7; cursor: default; }
.bet-opt.placed { background: rgba(249,115,22,0.14); border-color: var(--orange); cursor: default; }
.bet-label { font-size: 0.78rem; font-weight: 700; color: var(--text); display: block; margin-bottom: 2px; }
.bet-odds { font-size: 0.72rem; font-weight: 800; color: var(--gold); }
.bet-opt.won .bet-odds { color: var(--green); }
.bet-opt.lost .bet-odds { color: var(--red); }

.bet-stake-row {
  display: flex; align-items: center; gap: 8px; margin-top: 10px;
}
.stake-inp {
  width: 80px; padding: 7px 10px; background: rgba(255,255,255,0.07);
  border: 1px solid var(--border); border-radius: 8px; color: var(--text);
  font-size: 0.88rem; font-weight: 700; font-family: inherit; outline: none;
  -moz-appearance: textfield;
}
.stake-inp::-webkit-outer-spin-button, .stake-inp::-webkit-inner-spin-button { -webkit-appearance: none; }
.stake-inp:focus { border-color: var(--gold); }
.place-btn {
  flex: 1; padding: 8px 14px; background: var(--gold); color: #0a1f44;
  border: none; border-radius: 8px; font-size: 0.82rem; font-weight: 900;
  cursor: pointer; font-family: inherit;
}
.place-btn:disabled { opacity: 0.5; cursor: default; }
.payout-hint { font-size: 0.7rem; color: var(--muted); margin-left: auto; white-space: nowrap; }

/* BET SLIP */
.bet-slip-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 16px; margin-bottom: 12px;
  display: flex; align-items: center; gap: 12px;
}
.slip-icon { font-size: 1.4rem; flex-shrink: 0; }
.slip-info { flex: 1; min-width: 0; }
.slip-match { font-size: 0.72rem; color: var(--muted); }
.slip-label { font-size: 0.88rem; font-weight: 700; }
.slip-stake { font-size: 0.72rem; color: var(--muted); }
.slip-result {
  font-size: 0.78rem; font-weight: 800; padding: 4px 10px;
  border-radius: 20px; flex-shrink: 0; white-space: nowrap;
}
.slip-result.pending { background: rgba(249,115,22,0.2); color: var(--orange); }
.slip-result.won     { background: rgba(0,197,142,0.2); color: var(--green); }
.slip-result.lost    { background: rgba(239,68,68,0.2); color: var(--red); }

/* EMPTY */
.empty { text-align: center; padding: 48px 20px; color: var(--muted); }
.empty .icon { font-size: 2.5rem; margin-bottom: 12px; }

/* LOADING */
.loading { text-align: center; padding: 48px 20px; color: var(--muted); font-size: 0.9rem; }

/* TOAST */
#toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: #1f2937; color: #e5e7eb; border-radius: 20px;
  padding: 10px 20px; font-size: 0.85rem; font-weight: 600;
  z-index: 999; opacity: 0; transition: opacity 0.2s, transform 0.2s;
  pointer-events: none; white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="topbar">
  <a class="back" href="/worldcup/games/">← Games</a>
  <div id="topbar-title">🎰 Live Bets</div>
  <div class="coins-pill">🪙 <span id="coin-display">—</span></div>
</div>

<div id="hero">
  <div class="eyebrow">Virtual Fan Coins · No Real Money</div>
  <h2>Prop Bets During Matches</h2>
  <p>Spend your coins on live and upcoming games. Bets settle when matches end.</p>
</div>

<div id="tabs">
  <button class="tab active" onclick="setTab('matches')">Matches</button>
  <button class="tab" onclick="setTab('mybets')">My Bets <span id="bet-count-badge"></span></button>
</div>

<main id="main-content"></main>

<div id="toast"></div>

<script>
const API = '/worldcup';
const apiFetch = (path, opts = {}) => fetch(`${API}${path}`, { credentials: 'include', ...opts });

const STARTING_COINS = 1000;
const LS_COINS = 'wc-bet-coins';
const LS_BETS  = 'wc-bets';

let coins = parseInt(localStorage.getItem(LS_COINS) ?? STARTING_COINS);
let bets   = JSON.parse(localStorage.getItem(LS_BETS) ?? '[]');
let allMatches = [];
let currentTab = 'matches';
let currentMarket = {}; // matchId+marketId → selected option
let stakeVals = {};     // matchId+marketId → stake

function saveCoins() { localStorage.setItem(LS_COINS, coins); }
function saveBets()  { localStorage.setItem(LS_BETS, JSON.stringify(bets)); }

function toast(msg, ms = 2500) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), ms);
}

function updateCoinDisplay() {
  document.getElementById('coin-display').textContent = coins.toLocaleString();
}

// ── MARKETS definition ──
function marketsFor(m) {
  const home = m.home.name; const away = m.away.name;
  const h = m.home.flag; const a = m.away.flag;
  return [
    {
      id: 'result', title: 'Match Result',
      opts: [
        { label: `${h} ${home} wins`,   odds: 2.2 },
        { label: 'Draw',                odds: 3.0 },
        { label: `${a} ${away} wins`,   odds: 2.2 },
      ],
      resolve: (m, betOpt) => {
        if (m.homeScore == null || m.awayScore == null) return null;
        const r = m.homeScore > m.awayScore ? 0 : m.awayScore > m.homeScore ? 2 : 1;
        return betOpt === r ? 'won' : 'lost';
      }
    },
    {
      id: 'goals', title: 'Total Goals',
      opts: [
        { label: 'Over 2.5 goals',  odds: 1.8 },
        { label: 'Under 2.5 goals', odds: 2.0 },
      ],
      resolve: (m, betOpt) => {
        if (m.homeScore == null || m.awayScore == null) return null;
        const total = m.homeScore + m.awayScore;
        const won = betOpt === 0 ? total > 2 : total <= 2;
        return won ? 'won' : 'lost';
      }
    },
    {
      id: 'bts', title: 'Both Teams to Score',
      opts: [
        { label: '✅ Yes — both score', odds: 1.7 },
        { label: '❌ No — at least one clean sheet', odds: 2.1 },
      ],
      resolve: (m, betOpt) => {
        if (m.homeScore == null || m.awayScore == null) return null;
        const bts = m.homeScore > 0 && m.awayScore > 0;
        return (betOpt === 0) === bts ? 'won' : 'lost';
      }
    },
    {
      id: 'first', title: 'First Team to Score',
      opts: [
        { label: `${h} ${home} scores first`, odds: 1.9 },
        { label: `${a} ${away} scores first`, odds: 1.9 },
        { label: 'No goals (0-0 draw)',        odds: 7.0 },
      ],
      resolve: (m, betOpt) => {
        if (m.homeScore == null || m.awayScore == null) return null;
        if (m.homeScore === 0 && m.awayScore === 0) return betOpt === 2 ? 'won' : 'lost';
        // Without detailed event data: if home > 0 → home scored, else away scored first
        // Simple proxy: if home scored more = home first, else away first
        const first = m.homeScore >= m.awayScore ? 0 : 1;
        return betOpt === first ? 'won' : 'lost';
      }
    },
  ];
}

// ── RESOLVE pending bets ──
function resolveBets() {
  let changed = false;
  bets.forEach(bet => {
    if (bet.status !== 'pending') return;
    const m = allMatches.find(x => x.id === bet.matchId);
    if (!m || m.status !== 'finished') return;
    const markets = marketsFor(m);
    const market = markets.find(mk => mk.id === bet.marketId);
    if (!market) return;
    const result = market.resolve(m, bet.optionIdx);
    if (!result) return;
    bet.status = result;
    if (result === 'won') {
      const payout = Math.round(bet.stake * bet.odds);
      coins += payout;
      saveCoins(); updateCoinDisplay();
      toast(`🎉 Won! +${payout} coins on ${bet.label}`);
    }
    changed = true;
  });
  if (changed) saveBets();
}

// ── RENDER ──
function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0) === (tab === 'matches'));
  });
  render();
}

function render() {
  resolveBets();
  updateBadge();
  if (currentTab === 'matches') renderMatches();
  else renderMyBets();
}

function updateBadge() {
  const pending = bets.filter(b => b.status === 'pending').length;
  document.getElementById('bet-count-badge').textContent = pending ? ` (${pending})` : '';
}

function renderMatches() {
  const el = document.getElementById('main-content');
  const now = Date.now();
  const relevant = allMatches.filter(m =>
    m.status === 'live' ||
    (m.status === 'scheduled' && new Date(m.date).getTime() - now < 3 * 3600_000)
  ).sort((a, b) => new Date(a.date) - new Date(b.date));

  const upcoming = allMatches.filter(m =>
    m.status === 'scheduled' && new Date(m.date).getTime() - now >= 3 * 3600_000
  ).sort((a, b) => new Date(a.date) - new Date(b.date)).slice(0, 8);

  if (!relevant.length && !upcoming.length) {
    el.innerHTML = `<div class="empty"><div class="icon">⏳</div><p>No matches open for betting right now.<br>Check back on match day!</p></div>`;
    return;
  }

  const section = (title, matches) => matches.length ? `
    <div style="font-size:0.68rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin:16px 0 10px">${title}</div>
    ${matches.map(matchCard).join('')}` : '';

  el.innerHTML = section('Live & Kicking Off Soon', relevant) + section('Upcoming', upcoming);

  // wire stakeInputs
  el.querySelectorAll('.stake-inp').forEach(inp => {
    const key = inp.dataset.key;
    inp.value = stakeVals[key] ?? 50;
    inp.addEventListener('input', () => {
      stakeVals[key] = Math.max(1, Math.min(coins, parseInt(inp.value) || 0));
      // update payout hint
      const parts = key.split(':');
      const matchId = +parts[0]; const marketId = parts[1]; const optIdx = +parts[2];
      const m = allMatches.find(x => x.id === matchId);
      if (!m) return;
      const market = marketsFor(m).find(mk => mk.id === marketId);
      if (!market) return;
      const odds = market.opts[optIdx].odds;
      const hint = inp.closest('.bet-stake-row')?.querySelector('.payout-hint');
      if (hint) hint.textContent = `→ ${Math.round(stakeVals[key] * odds)} coins`;
    });
  });
}

function matchCard(m) {
  const isLive = m.status === 'live';
  const isDone = m.status === 'finished';
  const dt = new Date(m.date);
  const timeStr = dt.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  const dateStr = dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

  let scoreHTML = isLive || isDone
    ? `<div class="mbc-score">${m.homeScore ?? 0}–${m.awayScore ?? 0}</div>`
    : `<div class="mbc-vs">vs<br><span style="font-size:0.65rem;color:var(--muted)">${timeStr}</span></div>`;

  const markets = marketsFor(m);
  const marketsHTML = markets.map(market => marketBlock(m, market)).join('');

  return `<div class="match-bet-card ${isLive ? 'live-card' : ''}">
    <div class="mbc-header">
      ${isLive ? '<span class="live-dot">LIVE</span>' : `<span class="match-time">${dateStr} · ${timeStr}</span>`}
      <span style="font-size:0.68rem;color:var(--muted)">${m.group ? `Group ${m.group}` : (m.stage||'')}</span>
    </div>
    <div class="mbc-teams">
      <div class="mbc-team"><span class="mbc-flag">${m.home.flag}</span><span class="mbc-name">${m.home.name}</span></div>
      ${scoreHTML}
      <div class="mbc-team"><span class="mbc-flag">${m.away.flag}</span><span class="mbc-name">${m.away.name}</span></div>
    </div>
    <div class="markets">${marketsHTML}</div>
  </div>`;
}

function marketBlock(m, market) {
  const existingBet = bets.find(b => b.matchId === m.id && b.marketId === market.id);
  const locked = !!existingBet || m.status === 'finished';

  const optsHTML = market.opts.map((opt, i) => {
    let cls = 'bet-opt';
    if (existingBet) {
      if (existingBet.optionIdx === i) {
        cls += existingBet.status === 'pending' ? ' placed' : existingBet.status === 'won' ? ' won' : ' lost';
      }
    } else {
      if (currentMarket[`${m.id}:${market.id}`] === i) cls += ' selected';
    }
    return `<button class="${cls}" ${locked ? 'disabled' : ''} onclick="selectOpt(${m.id},'${market.id}',${i})">
      <span class="bet-label">${opt.label}</span>
      <span class="bet-odds">${opt.odds}x</span>
    </button>`;
  }).join('');

  let stakeHTML = '';
  if (!locked) {
    const selIdx = currentMarket[`${m.id}:${market.id}`];
    const key = `${m.id}:${market.id}:${selIdx ?? 0}`;
    const stake = stakeVals[key] ?? 50;
    const odds = market.opts[selIdx ?? 0]?.odds ?? 2;
    stakeHTML = `
      <div class="bet-stake-row">
        <input class="stake-inp" type="number" min="1" max="${coins}" data-key="${key}" value="${stake}">
        <button class="place-btn" onclick="placeBet(${m.id},'${market.id}')">Place Bet</button>
        <span class="payout-hint">→ ${Math.round(stake * odds)} coins</span>
      </div>`;
  } else if (existingBet) {
    const payout = Math.round(existingBet.stake * existingBet.odds);
    const statusText = existingBet.status === 'pending' ? `🟠 ${existingBet.stake} at ${existingBet.odds}x`
      : existingBet.status === 'won' ? `✅ Won +${payout} coins`
      : `❌ Lost ${existingBet.stake} coins`;
    stakeHTML = `<div style="font-size:0.75rem;color:var(--muted);margin-top:8px">${statusText}</div>`;
  }

  return `<div class="market">
    <div class="market-title">${market.title}</div>
    <div class="bet-row">${optsHTML}</div>
    ${stakeHTML}
  </div>`;
}

window.selectOpt = function(matchId, marketId, optIdx) {
  currentMarket[`${matchId}:${marketId}`] = optIdx;
  render();
};

window.placeBet = function(matchId, marketId) {
  const m = allMatches.find(x => x.id === matchId);
  if (!m) return;
  const market = marketsFor(m).find(mk => mk.id === marketId);
  if (!market) return;
  const optIdx = currentMarket[`${matchId}:${marketId}`];
  if (optIdx == null) { toast('Pick an option first'); return; }

  const key = `${matchId}:${marketId}:${optIdx}`;
  const stake = Math.max(1, Math.min(coins, parseInt(stakeVals[key] ?? 50)));
  if (stake > coins) { toast('Not enough coins!'); return; }

  const opt = market.opts[optIdx];
  coins -= stake;
  saveCoins(); updateCoinDisplay();

  bets.push({
    matchId, marketId, optionIdx: optIdx,
    label: opt.label, odds: opt.odds, stake, status: 'pending',
    matchName: `${m.home.flag} ${m.home.name} vs ${m.away.name} ${m.away.flag}`,
    ts: Date.now(),
  });
  saveBets();
  toast(`🎰 Bet placed: ${stake} coins on "${opt.label}"`);
  render();
};

function renderMyBets() {
  const el = document.getElementById('main-content');
  if (!bets.length) {
    el.innerHTML = `<div class="empty"><div class="icon">🎰</div><p>No bets placed yet.<br>Go to Matches to start betting!</p></div>`;
    return;
  }

  const sorted = [...bets].sort((a, b) => b.ts - a.ts);
  el.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <span style="font-size:0.8rem;color:var(--muted)">${bets.length} bets · Balance: <strong style="color:var(--gold)">${coins.toLocaleString()} coins</strong></span>
      <button onclick="resetCoins()" style="background:none;border:1px solid var(--border);color:var(--muted);border-radius:20px;padding:4px 10px;font-size:0.72rem;cursor:pointer">Reset</button>
    </div>
    ${sorted.map(slipCard).join('')}`;
}

function slipCard(bet) {
  const icons = { pending: '⏳', won: '✅', lost: '❌' };
  const payout = Math.round(bet.stake * bet.odds);
  const amtText = bet.status === 'won' ? `+${payout}` : bet.status === 'lost' ? `-${bet.stake}` : `${bet.stake} at ${bet.odds}x`;
  return `<div class="bet-slip-card">
    <div class="slip-icon">${icons[bet.status]}</div>
    <div class="slip-info">
      <div class="slip-match">${bet.matchName}</div>
      <div class="slip-label">${bet.label}</div>
      <div class="slip-stake">${amtText} coins</div>
    </div>
    <div class="slip-result ${bet.status}">${bet.status}</div>
  </div>`;
}

window.resetCoins = function() {
  if (!confirm('Reset your coins and all bets?')) return;
  coins = STARTING_COINS; bets = [];
  saveCoins(); saveBets(); updateCoinDisplay();
  toast('Reset to 1,000 coins');
  render();
};

// ── SSE for live updates ──
let _sse = null;
function connectSSE() {
  if (_sse) return;
  _sse = new EventSource(`${API}/api/events`);
  _sse.onmessage = async e => {
    try {
      const data = JSON.parse(e.data);
      if (data.type === 'match_update' && data.match) {
        const idx = allMatches.findIndex(m => m.id === data.match.id);
        if (idx !== -1) allMatches[idx] = data.match;
        else allMatches.push(data.match);
        render();
      }
    } catch (_) {}
  };
  _sse.onerror = () => { _sse.close(); _sse = null; setTimeout(connectSSE, 5000); };
}

// ── BOOT ──
updateCoinDisplay();
