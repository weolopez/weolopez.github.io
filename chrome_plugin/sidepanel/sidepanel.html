<!DOCTYPE html>
<html>
  
  <head>
    <style>
      body { 
        margin: 0;
        overflow: hidden; /* This line prevents scrolling */
        min-width: 600ox;
      }
      #selectedText_drawer {
        max-width: 600px; /* Assuming .chat-container has this max-width */
      }
      #selectedText {
          white-space: pre-wrap; /* CSS property to make text wrap */
          word-wrap: break-word; /* Ensures words break to prevent overflow */
          width: 450px;
      }
      .chat-container {
        width: 100%;
        height: 100vh; /* Set the height to 50% of the viewport height */
        max-width: 400px;
        background: #f9f9f9;
        border: 1px solid #ddd;
        border-radius: 5px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

.chat-header {
  background: #007bff;
  color: #fff;
  padding: 10px;
  text-align: center;
}

.chat-messages {
  list-style: none;
  padding: 20px;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  flex-grow: 1;
}

.message {
  margin-bottom: 15px;
  padding: 10px;
  border-radius: 20px;
  color: #333;
  max-width: 70%;
}

.other-message {
  background: #e9e9eb;
  align-self: flex-start;
}

.my-message {
  background: #007bff;
  color: #fff;
  align-self: flex-end;
}

.chat-footer {
  display: flex;
  padding: 10px;
  background: #f1f1f1;
}

.chat-input {
  flex-grow: 1;
  padding: 10px;
  margin-right: 10px;
  border: 1px solid #ddd;
  border-radius: 20px;
}

.send-button {
  background: #007bff;
  color: #fff;
  border: none;
  padding: 10px 15px;
  border-radius: 20px;
  cursor: pointer;
}
.collapsed {
  display: none;
}

.code-block {
    display: block;
    width: 100%; /* Respect the container's width */
    overflow-x: auto; /* Enable horizontal scrolling if needed */
    background-color: #0f0f0f; /* Hacker black background */
    color: #33ff33; /* Terminal green foreground */
    border: 1px solid #ddd; /* Light grey border */
    padding: 10px; /* Padding inside the code block */
    box-sizing: border-box; /* Include padding and border in the element's width */
    font-family: monospace; /* Monospaced font for code */
    white-space: pre-wrap; /* Preserve whitespaces and enable normal line breaks */
    word-wrap: break-word; /* Break the word to prevent overflow */
}
    </style>

<script src="https://cdn.jsdelivr.net/gh/MarketingPipeline/Markdown-Tag/markdown-tag.js"></script> 

  </head>

  <body>
    <div class="chat-container">
      <div class="chat-header">
        Chat
      </div>
      <ul class="chat-messages">
        <!-- More messages -->
      </ul>
      <div class="chat-footer">
        <input id="chat-input" type="text" placeholder="Type a message..." class="chat-input">
        <button class="send-button">Send</button>
      </div>
    </div>

    <details id="toSummarize_drawer">
      <summary>Show toSummarize</summary>
      <p id="toSummarize">Text to be added here</p>
    </details> -->

    <script src="./sidepanel.js"></script>


  </body>
</html>
