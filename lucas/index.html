<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lucas</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0052B4 0%, #00DF89 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 48px 56px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }
    h1 {
      font-size: 3rem;
      font-weight: 800;
      color: #0052B4;
      margin-bottom: 8px;
    }
    p {
      font-size: 1.1rem;
      color: #666;
      margin-top: 12px;
    }
    .emoji { font-size: 4rem; margin-bottom: 16px; display: block; }
  </style>
</head>
<body>
  <div class="card">
    <span class="emoji">👋</span>
    <h1>Hello, Lucas!</h1>
    <p>Welcome to <strong>lucas.weolopez.com</strong></p>
  </div>
</body>
</html>
